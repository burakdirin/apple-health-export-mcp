name: Publish

# Publishes to PyPI on a GitHub Release using Trusted Publishing (OIDC) — no API
# token stored. One-time setup: add this repo as a trusted publisher for the
# `apple-health-export-mcp` project at https://pypi.org/manage/account/publishing/.

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Build
        run: uv build
      - name: Publish to PyPI
        run: uv publish
